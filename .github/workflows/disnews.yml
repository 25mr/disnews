name: DisNews Weekly

on:
  schedule:
    - cron: "6 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: disnews
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        id: bot
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python main.py

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/articles.json docs/index.html; then
            echo "No changes to commit"
          else
            git add data/articles.json docs/index.html
            git commit -m "Update DisNews archive"
            git push
          fi

      - name: Fail if bot failed
        if: steps.bot.outcome == 'failure'
        run: exit 1
