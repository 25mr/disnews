name: Disroot Blog Newsletter

on:
  schedule:
    - cron: '6 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run newsletter script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scripts/fetch_and_send.py

      - name: Commit GitHub Pages data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Update blog data $(date -u +%Y-%m-%d)"
          git push
